<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线留言板</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">💬 在线留言板</div>
            <nav class="nav">
                <a href="/user/index" class="active">留言列表</a>
                <a href="/user/add">发表留言</a>
                <a href="/admin/login">管理后台</a>
                <div class="user-info">
                    <span class="user-name" th:text="${session.user?.nickname != null ? session.user.nickname : session.user.username}">用户</span>
                    <a href="/user/logout" class="btn logout-btn">退出</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h1 class="page-title">留言列表</h1>
                <a href="/user/add" class="btn btn-primary">+ 发表留言</a>
            </div>

            <div class="message-list" th:if="${not #lists.isEmpty(messages)}">
                <div class="message-item" th:each="msg : ${messages}">
                    <div class="message-header">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="message-author" th:text="${msg.username}">匿名用户</span>
                            <span class="tag tag-danger" th:if="${msg.isRisk == 1}">违规</span>
                        </div>
                        <span class="message-time" th:text="${#dates.format(msg.createTime, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
                    </div>
                    <div class="message-content" th:text="${msg.content}">留言内容...</div>
                    <div class="message-footer">
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span class="tag" th:class="${msg.status == 1} ? 'tag tag-success' : 'tag tag-warning'"
                                  th:text="${msg.statusText}">未处理</span>
                            <span class="tag tag-info" th:if="${msg.type != null}" th:text="${msg.type}">其他</span>
                        </div>
                        <a th:href="@{/user/detail(id=${msg.id})}" class="btn btn-default btn-sm">查看详情 →</a>
                    </div>
                </div>
            </div>

            <div class="card" th:if="${#lists.isEmpty(messages)}" style="text-align: center; padding: 48px;">
                <p style="color: var(--text-secondary); font-size: 16px;">暂无留言，点击「发表留言」按钮第一个留言吧！</p>
            </div>

            <div class="pagination" th:if="${totalPages > 0}">
                <span class="pagination-info">
                    共 <span th:text="${totalCount}">0</span> 条，第 <span th:text="${pageNum}">1</span> / <span th:text="${totalPages}">1</span> 页
                </span>
                <a th:href="@{/user/index(pageNum=${pageNum - 1}, pageSize=${pageSize})}"
                   th:class="${!hasPrev} ? 'disabled' : ''"
                   th:if="${hasPrev}">上一页</a>
                <span class="current" th:text="${pageNum}">1</span>
                <a th:href="@{/user/index(pageNum=${pageNum + 1}, pageSize=${pageSize})}"
                   th:class="${!hasNext} ? 'disabled' : ''"
                   th:if="${hasNext}">下一页</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>在线留言板管理系统 © 2026</p>
        </div>
    </footer>

    <script th:src="@{/js/user.js}"></script>
</body>
</html>
