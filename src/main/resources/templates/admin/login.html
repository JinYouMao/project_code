<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 在线留言板</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="login-box">
        <h2 class="login-title">管理员登录</h2>
        <p class="login-subtitle">管理后台系统</p>

        <div th:if="${error != null}" class="login-error" th:text="${error}">错误提示</div>

        <form action="/admin/doLogin" method="post">
            <div class="form-group">
                <label class="form-label">管理员账号</label>
                <input type="text" name="username" class="form-input" placeholder="请输入账号" required>
            </div>

            <div class="form-group">
                <label class="form-label">管理员密码</label>
                <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>

            <div style="margin-top:24px;">
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">登录</button>
            </div>
        </form>

        <div style="text-align:center;margin-top:16px;">
            <a href="/user/index" style="color:#8c8c8c;font-size:13px;">← 返回用户端</a>
        </div>
    </div>
</body>
</html>
