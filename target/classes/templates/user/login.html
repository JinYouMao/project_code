<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 在线留言板</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="login-box">
        <h2 class="login-title">欢迎回来</h2>
        <p class="login-subtitle">登录您的账户以继续使用</p>

        <form id="loginForm" onsubmit="return doLogin()">
            <div class="form-group">
                <label class="form-label">用户名 <span class="required">*</span></label>
                <input type="text" id="loginUsername" name="username" class="form-input" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label class="form-label">密码 <span class="required">*</span></label>
                <input type="password" id="loginPassword" name="password" class="form-input" placeholder="请输入密码" required>
            </div>

            <div style="margin-top: 28px;">
                <button type="submit" id="loginBtn" class="btn btn-primary btn-lg" style="width: 100%;">登录</button>
            </div>

            <div style="text-align: center; margin-top: 24px;">
                <span style="color: var(--text-secondary);">还没有账户？</span>
                <a href="/user/register" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">立即注册</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        function doLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return false;
            }

            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);

            fetch('/user/doLogin', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 200) {
                    alert('登录成功');
                    window.location.href = '/user/index';
                } else {
                    alert(result.message || '登录失败');
                }
            })
            .catch(error => {
                console.error(error);
                alert('登录失败，请重试');
            });

            return false;
        }
    </script>
</body>
</html>
