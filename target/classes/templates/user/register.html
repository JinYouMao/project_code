<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 在线留言板</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="login-box">
        <h2 class="login-title">创建账户</h2>
        <p class="login-subtitle">加入我们，开始您的留言之旅</p>

        <form id="registerForm" onsubmit="return doRegister()">
            <div class="form-group">
                <label class="form-label">用户名 <span class="required">*</span></label>
                <input type="text" id="regUsername" name="username" class="form-input" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label class="form-label">手机号 <span class="required">*</span></label>
                <input type="text" id="regPhone" name="phone" class="form-input" placeholder="请输入手机号" required>
            </div>

            <div class="form-group">
                <label class="form-label">密码 <span class="required">*</span></label>
                <input type="password" id="regPassword" name="password" class="form-input" placeholder="请输入密码" required>
            </div>

            <div class="form-group">
                <label class="form-label">确认密码 <span class="required">*</span></label>
                <input type="password" id="regConfirmPassword" class="form-input" placeholder="请再次输入密码" required>
            </div>

            <div style="margin-top: 28px;">
                <button type="submit" id="registerBtn" class="btn btn-primary btn-lg" style="width: 100%;">注册</button>
            </div>

            <div style="text-align: center; margin-top: 24px;">
                <span style="color: var(--text-secondary);">已有账户？</span>
                <a href="/user/login" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">立即登录</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        function doRegister() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const phone = document.getElementById('regPhone').value;

            if (!username || !password || !phone) {
                alert('请填写完整信息');
                return false;
            }

            if (password !== confirmPassword) {
                alert('两次密码输入不一致');
                return false;
            }

            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            formData.append('phone', phone);

            fetch('/user/doRegister', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 200) {
                    alert('注册成功！');
                    window.location.href = '/user/login';
                } else {
                    alert(result.message || '注册失败');
                }
            })
            .catch(error => {
                console.error(error);
                alert('注册失败，请重试');
            });

            return false;
        }
    </script>
</body>
</html>
