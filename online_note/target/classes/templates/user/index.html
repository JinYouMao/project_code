<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线留言板 - 首页</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .navbar-glass {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.92), rgba(139, 92, 246, 0.92));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 30px rgba(99, 102, 241, 0.25);
        }
        .navbar-glass .nav-link {
            color: rgba(255, 255, 255, 0.75);
            transition: all 0.3s ease;
            position: relative;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        .navbar-glass .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
        }
        .navbar-glass .nav-link.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            font-weight: 600;
        }
        .navbar-glass .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
        }
        .logo-text {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero-section h2 {
            color: #fff;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
        }
        .hero-section p {
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
            font-size: 0.95rem;
        }
        .hero-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 0.65rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .hero-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }
        .message-list {
            display: grid;
            gap: 1rem;
        }
        .pagination-modern {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            padding: 1.5rem 0;
        }
        .pagination-modern .btn {
            border-radius: 10px;
            padding: 0.5rem 1.25rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .pagination-modern .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .page-info-modern {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            background: #f1f5f9;
            border-radius: 8px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .loading-modern {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }
        .loading-modern .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer-modern {
            text-align: center;
            padding: 2rem 1rem;
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #f1f5f9;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header navbar-glass">
            <div class="header-content">
                <h1 class="logo logo-text">📝 在线留言板</h1>
                <nav class="nav">
                    <a href="/user/index" class="nav-link active">留言列表</a>
                    <a href="/user/add" class="nav-link">提交留言</a>
                    <a href="/admin/login" class="nav-link">管理后台</a>
                </nav>
            </div>
        </header>

        <main class="main-content animate-fade-in">
            <div class="hero-section">
                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; position: relative; z-index: 1;">
                    <div>
                        <h2>留言列表</h2>
                        <p>浏览所有留言，查看详情与管理员回复</p>
                    </div>
                    <button class="hero-btn" onclick="location.href='/user/add'">
                        ✏️ 我要留言
                    </button>
                </div>
            </div>

            <div id="messageList" class="message-list">
                <div class="loading loading-modern">
                    <div class="spinner"></div>
                    <div>加载中...</div>
                </div>
            </div>

            <div class="pagination pagination-modern" id="pagination">
                <button class="btn btn-sm" onclick="prevPage()" id="prevBtn">← 上一页</button>
                <span class="page-info page-info-modern" id="pageInfo">第 1 页 / 共 1 页</span>
                <button class="btn btn-sm" onclick="nextPage()" id="nextBtn">下一页 →</button>
            </div>
        </main>

        <footer class="footer footer-modern">
            <p>&copy; 2024 在线留言板管理系统 - 计算机专业课程设计</p>
        </footer>
    </div>

    <script src="/js/user.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadMessages();
        });
    </script>
</body>
</html>
