<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 在线留言板</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0a1a;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(79, 70, 229, 0.08) 0%, transparent 70%);
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-2%, -2%) rotate(3deg); }
        }

        .login-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15), transparent),
                radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.12), transparent),
                radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,0.08), transparent),
                radial-gradient(1.5px 1.5px at 10% 80%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1.5px 1.5px at 90% 10%, rgba(255,255,255,0.12), transparent);
        }

        .login-box {
            background: rgba(30, 27, 75, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                        0 0 80px rgba(99, 102, 241, 0.08);
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #f1f0ff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .admin-badge {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(139, 92, 246, 0.3));
            color: #c7d2fe;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            letter-spacing: 0.05em;
        }

        .login-form .form-group {
            margin-bottom: 1.5rem;
        }

        .login-form label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        .login-form input {
            width: 100%;
            height: 52px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0 1.2rem;
            color: #f1f0ff;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .login-form input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .login-form input:focus {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1),
                        0 0 20px rgba(99, 102, 241, 0.05);
        }

        .login-form .btn {
            width: 100%;
            height: 52px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .login-form .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .login-form .btn:hover::before {
            opacity: 1;
        }

        .login-form .btn span {
            position: relative;
            z-index: 1;
        }

        .login-form .btn:active {
            transform: scale(0.98);
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .login-footer a {
            color: rgba(165, 160, 255, 0.7);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: #a5a0ff;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
            font-size: 0.9rem;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(30, 27, 75, 0.9);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5);
        }

        .modal-header h3 {
            color: #f1f0ff;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .modal-body p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .modal-footer {
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
        }

        .modal-footer .btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .modal-footer .btn:hover {
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="admin-badge">🔐 管理后台</span>
                <h1>管理员登录</h1>
                <p>在线留言板管理系统</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">管理员账号</label>
                    <input type="text" id="username" name="username"
                           placeholder="请输入管理员账号" required>
                </div>

                <div class="form-group">
                    <label for="password">登录密码</label>
                    <input type="password" id="password" name="password"
                           placeholder="请输入登录密码" required>
                </div>

                <button type="submit" class="btn btn-primary">
                    <span>登 录</span>
                </button>
            </form>

            <div class="login-footer">
                <a href="/user/index">← 返回用户端首页</a>
            </div>
        </div>
    </div>

    <div id="alertModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="alertTitle">提示</h3>
            </div>
            <div class="modal-body">
                <p id="alertMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeAlert()">确定</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            doLogin();
        });

        function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username) {
                showError('请输入管理员账号');
                return;
            }

            if (!password) {
                showError('请输入登录密码');
                return;
            }

            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            fetch('/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('登录成功', '正在跳转...');
                    setTimeout(function() {
                        location.href = '/manage/index';
                    }, 1000);
                } else {
                    showError(data.message);
                }
            })
            .catch(error => {
                showError('网络错误，请稍后重试');
            });
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showAlert(title, message) {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = message;
            document.getElementById('alertModal').style.display = 'flex';
        }

        function closeAlert() {
            document.getElementById('alertModal').style.display = 'none';
        }

        document.getElementById('alertModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAlert();
            }
        });
    </script>
</body>
</html>
